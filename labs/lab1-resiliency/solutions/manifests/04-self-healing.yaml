# =============================================================================
# Exercise 4 — Self-Healing with ReplicaSets
# Deploys 3 replicas of Nginx. When you delete pods, Kubernetes automatically
# recreates them to maintain the desired replica count.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing
  namespace: lab1
  labels:
    app: self-healing
spec:
  replicas: 3
  selector:
    matchLabels:
      app: self-healing
  template:
    metadata:
      labels:
        app: self-healing
    spec:
      # Spread pods across nodes for better availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: self-healing
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: self-healing-svc
  namespace: lab1
spec:
  selector:
    app: self-healing
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
