# =============================================================================
# Challenge 1 — CrashLoopBackOff
# This deployment has a bug: it specifies a command that doesn't exist
# in the nginx image, causing the container to crash immediately.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-app
  namespace: lab2
  labels:
    app: crashloop-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-app
  template:
    metadata:
      labels:
        app: crashloop-app
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          # BUG: This command doesn't exist in the nginx image
          command: ["/bin/start-app"]
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
