# =============================================================================
# Solution 2 — ImagePullBackOff Fix
# Corrected the image name from "nginxxx" to "nginx".
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imagepull-app
  namespace: lab2
  labels:
    app: imagepull-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imagepull-app
  template:
    metadata:
      labels:
        app: imagepull-app
    spec:
      containers:
        - name: web
          # FIX: Corrected image name from "nginxxx" to "nginx"
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
