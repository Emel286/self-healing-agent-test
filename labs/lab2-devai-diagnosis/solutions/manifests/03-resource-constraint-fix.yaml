# =============================================================================
# Solution 3 — Resource Constraint Fix
# Reduced memory request/limit from 64Gi to reasonable values.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-hog
  namespace: lab2
  labels:
    app: resource-hog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-hog
  template:
    metadata:
      labels:
        app: resource-hog
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              # FIX: Reduced to a realistic memory request
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
