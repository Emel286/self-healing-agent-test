# =============================================================================
# Challenge 5 — Multi-Container Pod with Broken Sidecar
# The sidecar container expects a config file at /shared-data/config.yaml
# but the emptyDir volume starts empty, causing the sidecar to crash.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-container-app
  namespace: lab2
  labels:
    app: multi-container-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-container-app
  template:
    metadata:
      labels:
        app: multi-container-app
    spec:
      volumes:
        # BUG: emptyDir starts empty — sidecar expects a config file here
        - name: shared-data
          emptyDir: {}
      containers:
        - name: main-app
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data

        - name: sidecar
          image: busybox:1.36
          # BUG: This reads a config file that doesn't exist
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting sidecar..."
              cat /shared-data/config.yaml
              echo "Config loaded, entering monitoring loop..."
              while true; do
                cat /shared-data/config.yaml > /dev/null
                sleep 10
              done
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: shared-data
              mountPath: /shared-data
