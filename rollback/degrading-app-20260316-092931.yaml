spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: degrading-app
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: degrading-app
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          # Write a custom nginx config with a health endpoint
          cat > /etc/nginx/conf.d/default.conf << 'CONF'
          server {
              listen 80;
              location / {
                  root /usr/share/nginx/html;
                  index index.html;
              }
              location /healthz {
                  return 200 "ok";
              }
              location /ready {
                  root /usr/share/nginx/html;
                  try_files /ready.txt =503;
              }
          }
          CONF

          # Create readiness file
          echo "ready" > /usr/share/nginx/html/ready.txt

          # Start nginx
          nginx -g 'daemon off;' &
          NGINX_PID=$!

          # Phase 1: Healthy (60 seconds)
          sleep 60

          # Phase 2: Start returning errors (update config to 500 on /error)
          cat > /etc/nginx/conf.d/default.conf << 'CONF'
          server {
              listen 80;
              location / {
                  return 500 "internal server error";
              }
              location /healthz {
                  return 200 "ok";
              }
              location /ready {
                  root /usr/share/nginx/html;
                  try_files /ready.txt =503;
              }
          }
          CONF
          nginx -s reload
          sleep 60

          # Phase 3: Remove readiness + consume memory
          rm -f /usr/share/nginx/html/ready.txt
          nginx -s reload

          # Allocate memory until OOM — writes to /dev/shm (tmpfs) which
          # counts against the container's memory cgroup limit
          while true; do
            dd if=/dev/urandom bs=1M count=5 >> /dev/shm/memory_hog 2>/dev/null
            sleep 2
          done

          wait $NGINX_PID
        image: nginx:1.27-alpine
        imagePullPolicy: IfNotPresent
